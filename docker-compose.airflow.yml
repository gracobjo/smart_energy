version: "3.8"

services:
  ###########################################################################
  # Airflow (api-server + scheduler)
  ###########################################################################
  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow_local
    restart: unless-stopped

    # Usamos red del host para que los DAGs que miran a 127.0.0.1:8080/9092/9042
    # sigan funcionando sin tocar el código (solo Linux).
    network_mode: "host"

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW_HOME: /opt/airflow
    volumes:
      # Metadatos y logs de Airflow en el host
      - ./docker/airflow/airflow_home:/opt/airflow
      - ./docker/airflow/logs:/opt/airflow/logs
      # Código del proyecto montado dentro del contenedor
      - ./:/opt/proyecto_transporte_global
      # DAGs de orquestación expuestos a Airflow
      - ./orquestacion:/opt/airflow/dags
    command: >
      bash -c "\
      airflow db upgrade && \
      airflow users create --role Admin --username admin --email admin@localhost --firstname Admin --lastname User --password admin || true && \
      airflow scheduler & \
      airflow api-server -H 0.0.0.0 -p 8080\
      "

  ###########################################################################
  # Cassandra (estado actual del gemelo digital)
  ###########################################################################
  cassandra:
    image: cassandra:4.1
    container_name: cassandra_local
    restart: unless-stopped
    network_mode: "host"   # expone 127.0.0.1:9042 en el host
    environment:
      CASSANDRA_CLUSTER_NAME: "LogisticaCluster"
      CASSANDRA_START_RPC: "true"
    volumes:
      - ./docker/cassandra/data:/var/lib/cassandra

  ###########################################################################
  # Kafka (cola de mensajes para ingesta)
  ###########################################################################
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka_local
    restart: unless-stopped
    network_mode: "host"   # expone 127.0.0.1:9092 en el host
    environment:
      # Modo KRaft de una sola instancia
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - ./docker/kafka/data:/bitnami/kafka
