services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartenergy
      POSTGRES_PASSWORD: smartenergy
      POSTGRES_DB: smartenergy
    ports:
      - "5432:5432"
    volumes:
      - smartenergy_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartenergy -d smartenergy"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
        ]
      interval: 5s
      timeout: 8s
      retries: 30
      start_period: 90s
    environment:
      DATABASE_URL: postgresql+psycopg2://smartenergy:smartenergy@postgres:5432/smartenergy
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-in-production}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /ingest-api
        NEXT_PUBLIC_WS_URL: ws://127.0.0.1:8000
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  smartenergy_pg:
